<head>
    <meta charset="utf-8">
    <title>Calendar</title>

    <!-- Make the app title different than the page title - iOS. -->
    <meta name="apple-mobile-web-app-title" content="Calendar">

    <!-- Make the app title different than the page title and configure icons - Android. -->
    <!--<link rel="manifest" href="/manifest.json">-->

    <!-- IE configuration for icons and colors is in browserconfig.xml -->

    <meta name="theme-color" content="#fff">

    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: "Sofia Sans Condensed", sans-serif;
            box-sizing: border-box;
            user-select: none;
        }

        .calendar,
        .widgets {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            padding: 1%;
            box-sizing: border-box;
            gap: 0.8%;
            width: 100%;
        }

        .widgets {
            width: 100%;
            height: 40%;
            padding-bottom: 2vh;
            justify-content: center;
            gap: 2%;
        }

        .widgets>div {
            flex: none;
            order: 0;
            align-self: center;
            text-align: center;
            flex-grow: 0;
            flex-shrink: 1;
            flex-basis: 20%;
            height: 100%;
        }

        .calendar {
            height: 60%;
        }

        .day {
            /* Monday */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.5%;
            gap: 1.5%;
            color: #000000;

            background: #DBF6FF66;
            border: 1px solid #D9D9D9;
            border-radius: 5px;

            /* Inside auto layout */

            flex: none;
            order: 0;
            align-self: center;
            flex-grow: 1;
            flex-shrink: 1;
            flex-basis: 0;
            height: 100%;
        }

        .day.past {
            opacity: 0.5;
        }

        .day.weekend {
            background-color: #FFE1E166;
        }

        .day.active {
            background-image: linear-gradient(0deg, rgba(61, 245, 167, 1) 50%, rgba(9, 111, 224, 1) 100%);
            color: white;
            font-weight: 700;
        }

        .day-name,
        .clock-label {
            font-style: normal;
            font-size: 16px;
            line-height: 19px;
            text-transform: uppercase;
            text-align: center;
        }

        .event {
            background-size: cover;
            background-position: center center;
            border-radius: 5px;
            border: 1px solid white;
            box-sizing: border-box;

            /* Inside auto layout */
            flex: none;
            order: 1;
            align-self: stretch;
            flex-grow: 1;
            max-height: 60%;
        }

        .clock-label {
            height: 1.5em;
        }

        .clock svg {
            height: 90%;
        }

        .clock-ring {
            stroke: #EBEBEB;
        }

        .clock-ring-inner,
        .active .hour-progress,
        #am_clock .hour-progress,
        .hour-marks {
            stroke: url(#0);
        }

        .clock .icon use {
            pointer-events: none;
            fill: white;
            stroke: #333;
            stroke-width: 10px;
        }

        .hour-hand,
        .min-hand {
            transform-origin: 2.105px 2.105px;
        }

        .active .hour-hand line,
        .active .min-hand line {
            stroke: #096fe0;
        }

        .mid-circle {
            fill: #096fe0;
        }

        .number {
            pointer-events: none;
            text-anchor: middle;
            font-size: 0.3px;
            font-weight: 700;
        }

        .clock {
            --pi: 3.1415926535897932;
            --viewbox: 4.21px;
            --center: calc(var(--viewbox)/2);
            --icon-radius: 1.9px;
            --number-radius: 1.35px;
            --icon-offset-x: -0.2px;
            --icon-offset-y: -2.105px;
            --number-offset-x: 0px;
            --number-offset-y: 0.1px;
        }

        .clock .number:nth-of-type(1),
        .clock .icon-12 {
            --index: 0;
        }

        .clock .number:nth-of-type(2),
        .clock .icon-1 {
            --index: 1;
        }

        .clock .number:nth-of-type(3),
        .clock .icon-2 {
            --index: 2;
        }

        .clock .number:nth-of-type(4),
        .clock .icon-3 {
            --index: 3;
        }

        .clock .number:nth-of-type(5),
        .clock .icon-4 {
            --index: 4;
        }

        .clock .number:nth-of-type(6),
        .clock .icon-5 {
            --index: 5;
        }

        .clock .number:nth-of-type(7),
        .clock .icon-6 {
            --index: 6;
        }

        .clock .number:nth-of-type(8),
        .clock .icon-7 {
            --index: 7;
        }

        .clock .number:nth-of-type(9),
        .clock .icon-8 {
            --index: 8;
        }

        .clock .number:nth-of-type(10),
        .clock .icon-9 {
            --index: 9;
        }

        .clock .number:nth-of-type(11),
        .clock .icon-10 {
            --index: 10;
        }

        .clock .number:nth-of-type(12),
        .clock .icon-11 {
            --index: 11;
        }

        .clock .number {
            --translate-x: calc(var(--center) + var(--number-radius) * cos((var(--index) * (360 / 12) - 90) * var(--pi) / 180) + var(--number-offset-x));
            --translate-y: calc(var(--center) + var(--number-radius) * sin((var(--index) * (360 / 12) - 90) * var(--pi) / 180) + var(--number-offset-y));
            transform: translate(var(--translate-x), var(--translate-y));
        }

        .clock .icon {
            --translate-x: calc(var(--center) + var(--icon-radius) * cos((var(--index) * (360 / 12) - 90) * var(--pi) / 180) + var(--icon-offset-x));
            --translate-y: calc(var(--center) + var(--icon-radius) * sin((var(--index) * (360 / 12) - 90) * var(--pi) / 180) + var(--icon-offset-y));
            transform: translate(var(--translate-x), var(--translate-y));
        }

        .symbols-library {
            position: absolute;
            width: 0;
            height: 0;
            overflow: hidden;
        }

        .dark {
            background-color: #000000;
        }

        .dark .calendar {
            visibility: hidden;
        }

        .dark .clock-ring {
            stroke: #333;
        }

        .weather {
            width: 100%;
            height: 90%;
            font-size: 1.8rem;
            display: none;
        }

        .current-temp {
            font-size: 3rem;
        }

        .current-temp::after,
        .max-temp::after {
            content: "°";
        }

        #icon_snow,
        #icon_rain {
            width: 1.8rem;
            height: 1.8rem;
            display: none;
            vertical-align: text-top;
        }

        .weather-text {
            height: 3rem;
        }

        .weather-icon {
            height: calc(100% - 3rem);
            width: 100%;
            background-size: contain;
            background-position: center center;
            background-repeat: no-repeat;
        }
    </style>

</head>

    <script>
        const root = document.documentElement;
        const cal = document.getElementById("calendar");
        const calDays = document.getElementById("calendar").getElementsByClassName("day");
        const amClock = document.getElementById("am_clock");
        const pmClock = document.getElementById("pm_clock");
        const amClockProgress = amClock.getElementsByClassName("hour-progress")[0];
        const pmClockProgress = pmClock.getElementsByClassName("hour-progress")[0];
        const amHourHand = amClock.getElementsByClassName("hour-hand")[0];
        const pmHourHand = pmClock.getElementsByClassName("hour-hand")[0];
        const amMinHand = amClock.getElementsByClassName("min-hand")[0];
        const pmMinHand = pmClock.getElementsByClassName("min-hand")[0];


        const runClock = () => {
            let d = new Date();
            let day = d.getDay() - 1;
            if (day == -1) day = 6;
            let hr = d.getHours();
            let min = d.getMinutes();
            let sec = d.getSeconds();
            let hrPosition = (hr * 360) / 12 + (min * (360 / 60)) / 12;
            let minPosition = (min * 360) / 60 + (sec * (360 / 60)) / 60;
            let hour = hr + min / 60;
            let hoursRemaining = 12 - (hr + min / 60);
            let pmHour = hr + min / 60 - 12;
            let pmHoursRemaining = 24 - (hr + min / 60);

            if (hr < 12) {
                if (!amClock.classList.contains("active")) {
                    amClock.classList.add("active");
                    pmClock.classList.remove("active");
                }
                amClockProgress.setAttribute("stroke-dasharray", hour + " " + hoursRemaining);
                amHourHand.style.transform = "rotate(" + hrPosition + "deg)";
                amMinHand.style.transform = "rotate(" + minPosition + "deg)";
            }
            else {
                if (!pmClock.classList.contains("active")) {
                    amClockProgress.setAttribute("stroke-dasharray", "12 0");
                    pmClock.classList.add("active");
                    amClock.classList.remove("active");
                }
                pmClockProgress.setAttribute("stroke-dasharray", pmHour + " " + pmHoursRemaining);
                pmHourHand.style.transform = "rotate(" + hrPosition + "deg)";
                pmMinHand.style.transform = "rotate(" + minPosition + "deg)";
            }
            if ((hr >= 21 || hr < 7) && !root.classList.contains("dark")) {
                root.classList.add("dark");
            }
            else if ((hr >= 7 && hr < 21) && root.classList.contains("dark")) {
                root.classList.remove("dark");
            }
            if (!calDays[day].classList.contains("active")) {
                calDays[day].classList.add("active");
                for (let i = 0; i < day; i++) {
                    calDays[i].classList.remove("active");
                    calDays[i].classList.add("past");
                }
            }
        };

        setInterval(runClock, 1000);

        const weather = document.getElementById("weather");
        const weatherIcon = document.getElementById("weather_icon");
        const currentTemp = document.getElementById("current_temp");
        const maxTemp = document.getElementById("max_temp");
        const iconSnow = document.getElementById("icon_snow");
        const iconRain = document.getElementById("icon_rain");

        async function getWeather() {
            const currentWeather = await fetch('/.netlify/functions/currentWeather').then(
                currentWeather => currentWeather.json()
            )
            const todayForecast = await fetch('/.netlify/functions/todayForecast').then(
                todayForecast => todayForecast.json()
            )
            if (currentWeather) {
                currentTemp.innerText = currentWeather[0].RealFeelTemperature.Metric.Value;
                maxTemp.innerText = todayForecast.DailyForecasts[0].RealFeelTemperature.Maximum.Value;
                switch (todayForecast.DailyForecasts[0].Day.PrecipitationType) {
                    case "Rain": iconRain.style.display = "inline"; break;
                    case "Snow": iconSnow.style.display = "inline"; break;
                }
                weatherIcon.style.backgroundImage = "url(https://www.accuweather.com/images/weathericons/" + todayForecast.DailyForecasts[0].Day.Icon + ".svg)";
                weather.style.display = "block";

            }
        }

        async function getCalendar() {
            const calendarData = await fetch('/.netlify/functions/calendar').then(
                calendarData => calendarData.json()
            )
            if (calendarData)
                for (let i = 0; i < calendarData.records.length; i++) {
                    for (let p = 0; p < calendarData.records[i].fields.Photos.length; p++) {
                        let photoNode = document.createElement("div");
                        photoNode.className = "event";
                        photoNode.style.backgroundImage = "url(" + calendarData.records[i].fields.Photos[p].thumbnails.large.url + ")";
                        cal.getElementsByClassName("day")[i].append(photoNode);
                    }
                }
        }

        getWeather();
        getCalendar();
    </script>
