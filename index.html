<head>
    <meta charset="utf-8">
    <title>Kids Planner</title>

    <!-- CONFIGURATION -->

    <!-- Allow web app to be run in full-screen mode - iOS. -->
    <meta name="apple-mobile-web-app-capable" content="yes">

    <!-- Allow web app to be run in full-screen mode - Android. -->
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Make the app title different than the page title - iOS. -->
    <meta name="apple-mobile-web-app-title" content="Kids Planner">

    <!-- Make the app title different than the page title and configure icons - Android. -->
    <link rel="manifest" id="manifestPlaceholder" type="application/manifest+json">

    <!-- IE configuration for icons and colors is in browserconfig.xml -->

    <!-- Configure the status bar - iOS. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="white">

    <!-- Set the viewport. -->
    <meta name="viewport"
        content="viewport-fit=cover, width=device-width, user-scalable=no, initial-scale=1, maximum-scale=1, minimal-ui">

    <!-- Disable automatic phone number detection. -->
    <meta name="format-detection" content="telephone=no">

    <!-- Android dock color -->
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sofia+Sans+Condensed:wght@200;400;700&display=swap"
        rel="stylesheet">
    <style>
        html,
        body,
        .parent {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: "Sofia Sans Condensed", sans-serif;
            box-sizing: border-box;
            user-select: none;
        }

        .parent {
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            padding: 1vw;
        }

        .calendar,
        .widgets {
            display: flex;
            flex-direction: row;
            box-sizing: border-box;
            gap: 1vw;
        }

        .widgets {
            justify-content: center;
            align-items: center;
            flex-basis: 40%;
            flex-grow: 1;
            flex-shrink: 1;
        }

        .clock,
        .weather {
            flex-basis: 24vw;
            box-sizing: border-box;
            text-align: center;
        }

        .day-name,
        .clock-label,
        .weather-text {
            font-style: normal;
            font-size: 2.8vh;
            line-height: 1;
            text-transform: uppercase;
            text-align: center;
            white-space: nowrap;
        }

        .weather-text {
            font-size: 3.2vh;
            line-height: 0.8;
        }

        .current-temp {
            font-size: 1.5em;
        }

        .weather-text svg {
            max-width: 1em;
            max-height: 1em;
            display: none;
            vertical-align: text-top;
        }

        .clock>svg,
        .weather>svg {
            max-height: 32vh;
            max-width: 100%;
        }

        .calendar {
            flex-basis: 60%;
            flex-grow: 1;
            flex-shrink: 1;
        }

        .day {
            /* Monday */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.5%;
            gap: 1.5%;
            color: #000000;
            overflow: hidden;
            box-sizing: border-box;
            background: #DBF6FF66;
            border: 1px solid #D9D9D9;
            border-radius: 5px;
            height: 100%;

            /* Inside auto layout */
            flex: none;
            order: 0;
            align-self: center;
            flex-grow: 1;
            flex-shrink: 1;
            flex-basis: 0;
        }

        .day.past {
            opacity: 0.5;
        }

        .day.weekend {
            background-color: #FFE1E166;
        }

        .day.active {
            background-image: linear-gradient(0deg, rgba(61, 245, 167, 1) 50%, rgba(9, 111, 224, 1) 100%);
            color: white;
            font-weight: 700;
        }

        .event {
            background-size: cover;
            background-position: center center;
            border-radius: 5px;
            border: 1px solid white;
            box-sizing: border-box;

            /* Inside auto layout */
            flex: none;
            align-self: stretch;
            flex-grow: 1;
            max-height: 60%;
        }

        .clock .clock-ring {
            stroke: #EBEBEB;
        }

        .clock .clock-ring-inner,
        .clock.active .hour-progress,
        .clock .hour-marks {
            stroke: url(#gradient-1);
        }

        .clock .icon use {
            pointer-events: none;
            fill: white;
            stroke: #333;
            stroke-width: 10px;
        }

        .clock .hour-hand,
        .clock .min-hand {
            transform-origin: 11px 11px;
        }

        .clock.active .hour-hand line,
        .clock.active .min-hand line {
            stroke: #096fe0;
        }

        .clock .mid-circle {
            fill: #096fe0;
        }

        .clock .numbers text {
            pointer-events: none;
            text-anchor: middle;
            font-size: 1.5px;
            font-weight: 700;
        }

        .clock {
            --pi: 3.1415926535897932;
            --viewbox: 22px;
            --center: calc(var(--viewbox)/2);
            --icon-radius: 5.4px;
            --number-radius: 7px;
            --icon-offset-x: -1px;
            --icon-offset-y: -11px;
            --number-offset-x: 0px;
            --number-offset-y: 0.5px;
        }

        .clock .icon use {
            pointer-events: none;
            fill: #999;
        }

        .clock .numbers text:nth-of-type(1),
        .clock .icon-12,
        .clock .icon-0 {
            --index: 0;
        }

        .clock .numbers text:nth-of-type(2),
        .clock .icon-1,
        .clock .icon-13 {
            --index: 1;
        }

        .clock .numbers text:nth-of-type(3),
        .clock .icon-2,
        .clock .icon-14 {
            --index: 2;
        }

        .clock .numbers text:nth-of-type(4),
        .clock .icon-3,
        .clock .icon-15 {
            --index: 3;
        }

        .clock .numbers text:nth-of-type(5),
        .clock .icon-4,
        .clock .icon-16 {
            --index: 4;
        }

        .clock .numbers text:nth-of-type(6),
        .clock .icon-5,
        .clock .icon-17 {
            --index: 5;
        }

        .clock .numbers text:nth-of-type(7),
        .clock .icon-6,
        .clock .icon-18 {
            --index: 6;
        }

        .clock .numbers text:nth-of-type(8),
        .clock .icon-7,
        .clock .icon-19 {
            --index: 7;
        }

        .clock .numbers text:nth-of-type(9),
        .clock .icon-8,
        .clock .icon-20 {
            --index: 8;
        }

        .clock .numbers text:nth-of-type(10),
        .clock .icon-9,
        .clock .icon-21 {
            --index: 9;
        }

        .clock .numbers text:nth-of-type(11),
        .clock .icon-10,
        .clock .icon-22 {
            --index: 10;
        }

        .clock .numbers text:nth-of-type(12),
        .clock .icon-11,
        .clock .icon-23 {
            --index: 11;
        }

        .clock .numbers text {
            --translate-x: calc(var(--center) + var(--number-radius) * cos((var(--index) * (360 / 12) - 90) * var(--pi) / 180) + var(--number-offset-x));
            --translate-y: calc(var(--center) + var(--number-radius) * sin((var(--index) * (360 / 12) - 90) * var(--pi) / 180) + var(--number-offset-y));
            transform: translate(var(--translate-x), var(--translate-y));
        }

        .clock .icon {
            --translate-x: calc(var(--center) + var(--icon-radius) * cos((var(--index) * (360 / 12) - 90) * var(--pi) / 180) + var(--icon-offset-x));
            --translate-y: calc(var(--center) + var(--icon-radius) * sin((var(--index) * (360 / 12) - 90) * var(--pi) / 180) + var(--icon-offset-y));
            transform: translate(var(--translate-x), var(--translate-y));
        }

        .symbols-library {
            position: absolute;
            width: 0;
            height: 0;
            overflow: hidden;
        }

        .dark {
            background-color: #000000;
        }

        .dark .calendar {
            visibility: hidden;
        }

        .dark .clock-ring {
            stroke: #333;
        }
    </style>

</head>

                        <circle class="sizing-box" cx="11" cy="11" r="9" fill="transparent" />
                    </g>
                </svg>
            </div>
            <div class="weather" id="weather"></div>
        </div>

        <div class="calendar" id="calendar">
            <div class="day">
                <div class="day-name">Monday</div>
            </div>
            <div class="day">
                <div class="day-name">Tuesday</div>
            </div>
            <div class="day">
                <div class="day-name">Wednesday</div>
            </div>
            <div class="day">
                <div class="day-name">Thursday</div>
            </div>
            <div class="day">
                <div class="day-name">Friday</div>
            </div>
            <div class="day weekend">
                <div class="day-name">Saturday</div>
            </div>
            <div class="day weekend">
                <div class="day-name">Sunday</div>
            </div>
            <div class="day">
                <div class="day-name">Monday</div>
            </div>
        </div>
        <!-- end // Calendar -->
    </div>

    <script>
        //Get URL query parameters
        const queryParams = new URLSearchParams(window.location.search);
        const userId = queryParams.get("id");
        let currentLanguage = queryParams.get("lang") || "en";
        let profile;

        //Register service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('/sw.js').then(function (registration) {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, function (err) {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }

        // Clock Functions
        const amClock = document.getElementById("am_clock");
        const pmClock = document.getElementById("pm_clock");
        const amClockProgress = amClock.getElementsByClassName("hour-progress")[0];
        const pmClockProgress = pmClock.getElementsByClassName("hour-progress")[0];
        const amHourHand = amClock.getElementsByClassName("hour-hand")[0];
        const pmHourHand = pmClock.getElementsByClassName("hour-hand")[0];
        const amMinHand = amClock.getElementsByClassName("min-hand")[0];
        const pmMinHand = pmClock.getElementsByClassName("min-hand")[0];
        const runClock = () => {
            const d = new Date();
            const day = (d.getDay() + 6) % 7;
            const hr = d.getHours();
            const min = d.getMinutes();
            const sec = d.getSeconds();
            const hrPosition = (hr * 360) / 12 + (min * (360 / 60)) / 12;
            const minPosition = (min * 360) / 60 + (sec * (360 / 60)) / 60;
            const hour = hr + min / 60;
            const hoursRemaining = 12 - hour;
            const pmHour = Math.max(0, hour - 12);
            const pmHoursRemaining = 24 - hour;
            const minElapsed = min + sec / 60;
            const minRemaining = 60 - minElapsed;
            updateClock(hr, hrPosition, minPosition, hour, hoursRemaining, pmHour, pmHoursRemaining, minElapsed, minRemaining);
            updateDarkMode(hour);
            updateCalendar(day);
        };
        const updateClock = (hr, hrPosition, minPosition, hour, hoursRemaining, pmHour, pmHoursRemaining, minElapsed, minRemaining) => {
            if (hr < 12) {
                activateClock(amClock, pmClock, amClockProgress, amHourHand, amMinHand, hour, hoursRemaining, hrPosition, minPosition, minElapsed, minRemaining);
            } else {
                activateClock(pmClock, amClock, pmClockProgress, pmHourHand, pmMinHand, pmHour, pmHoursRemaining, hrPosition, minPosition, minElapsed, minRemaining);
                amClockProgress.setAttribute("stroke-dasharray", "0 60");
            }
        }
        const activateClock = (activeClock, inactiveClock, activeClockProgress, activeHourHand, activeMinHand, hour, hoursRemaining, hrPosition, minPosition, minElapsed, minRemaining) => {
            if (!activeClock.classList.contains("active")) {
                activeClock.classList.add("active");
                inactiveClock.classList.remove("active");
            }
            activeClockProgress.setAttribute("stroke-dasharray", `${minElapsed} ${minRemaining}`);
            activeHourHand.style.transform = `rotate(${hrPosition}deg)`;
            activeMinHand.style.transform = `rotate(${minPosition}deg)`;
        }
        const updateDarkMode = (hour) => {
            if (profile?.sleepTimeSec && profile?.wakeUpTimeSec) {
                const sleepTimeHour = profile.sleepTimeSec / 3600;
                const wakeUpTimeHour = profile.wakeUpTimeSec / 3600;
                const isNight = hour >= sleepTimeHour || hour < wakeUpTimeHour;
                document.documentElement.classList.toggle("dark", isNight);
            }
        }
        const calDays = document.querySelectorAll("#calendar .day");
        const updateCalendar = (day) => {
            const activeDay = calDays[day];
            if (!activeDay.classList.contains("active")) {
                [...calDays].forEach((dayElement, index) => {
                    dayElement.classList.remove("active", "past");
                    if (index < day) {
                        dayElement.classList.add("past");
                    }
                });
                activeDay.classList.add("active");
            }
        }
        runClock();
        setInterval(runClock, 1000);

        // Localization Functions
        let manifestData = {
            "id": "https://kids-planner.netlify.app/",
            "scope": "https://kids-planner.netlify.app/",
            "start_url": `https://kids-planner.netlify.app/${userId}`,
            "name": "Kids Planner",
            "short_name": "Kids Planner",
            "description": "A static, non-interactive weekly planner for pre-school children. Features a clock, weather widget and a weekly calendar with activities.",
            "lang": "en",
            "theme_color": "#ffffff",
            "background_color": "#ffffff",
            "display": "fullscreen",
            "orientation": "landscape",
            "categories": [
                "education",
                "kids",
                "productivity"
            ],
            "screenshots": [
                {
                    "src": "https://kids-planner.netlify.app/screenshot.png",
                    "type": "image/png",
                    "sizes": "1280x800"
                }
            ],
            "icons": [
                {
                    "src": "https://kids-planner.netlify.app/icon-64x64.png",
                    "sizes": "64x64",
                    "type": "image/png"
                },
                {
                    "src": "https://kids-planner.netlify.app/icon-192x192.png",
                    "sizes": "192x192",
                    "type": "image/png"
                },
                {
                    "src": "https://kids-planner.netlify.app/icon-512x512.png",
                    "sizes": "512x512",
                    "type": "image/png"
                },
                {
                    "src": "https://kids-planner.netlify.app/icon-512x512.png",
                    "sizes": "512x512",
                    "type": "image/png",
                    "purpose": "any"
                },
                {
                    "src": "https://kids-planner.netlify.app/maskable-icon-512x512.png",
                    "sizes": "512x512",
                    "type": "image/png",
                    "purpose": "maskable"
                },
            ]
        };
        const localTimeOfDay = {
            "en": {
                "AM": "AM",
                "PM": "PM"
            },
            "bg": {
                "AM": "Преди обед",
                "PM": "След обед"
            }
        };
        const localDayNames = {
            "en": {
                "Monday": "Monday",
                "Tuesday": "Tuesday",
                "Wednesday": "Wednesday",
                "Thursday": "Thursday",
                "Friday": "Friday",
                "Saturday": "Saturday",
                "Sunday": "Sunday"
            },
            "bg": {
                "Monday": "Понеделник",
                "Tuesday": "Вторник",
                "Wednesday": "Сряда",
                "Thursday": "Четвъртък",
                "Friday": "Петък",
                "Saturday": "Събота",
                "Sunday": "Неделя"
            }
        };

        const getProfile = async () => {
            try {
                const response = await fetch(`/.netlify/functions/profile?id=${userId}`);
                if (!response.ok) {
                    let errorText = await response.text();
                    throw new Error(errorText);
                }

                profile = await response.json();
                currentLanguage = profile?.currentLanguage || currentLanguage;
            } catch (error) {
                console.error('Error:', error);
            } finally {
                updateManifest(profile?.displayName);
                updateTextContent();
                updateClockIcons(profile);
            }
        }
        const getFormattedTitle = (displayName, language) => {
            const titles = {
                "bg": displayName ? `Календар на ${displayName}` : "Детски календар",
                "en": displayName ? `${displayName}’s Planner` : "Kids Planner"
            };

            return titles[language];
        }
        const updateManifest = (name) => {
            document.title = getFormattedTitle(name, currentLanguage);
            manifestData.name = getFormattedTitle(name, currentLanguage);
            manifestData.short_name = getFormattedTitle(name, currentLanguage);
            manifestData.lang = currentLanguage;
            const manifestBlob = new Blob([JSON.stringify(manifestData)], { type: 'application/manifest+json' });
            const manifestUrl = URL.createObjectURL(manifestBlob);
            document.querySelector('#manifestPlaceholder').href = manifestUrl;
        };
        const updateTextContent = () => {
            amClock.getElementsByClassName("clock-label")[0].textContent = localTimeOfDay[currentLanguage]['AM'];
            pmClock.getElementsByClassName("clock-label")[0].textContent = localTimeOfDay[currentLanguage]['PM'];
            const dayNameElements = document.getElementsByClassName("day-name");
            for (let i = 0; i < dayNameElements.length; i++) {
                let initialDayName = dayNameElements[i].textContent;
                let localDayName = localDayNames[currentLanguage][initialDayName];
                dayNameElements[i].textContent = localDayName;
            }
        };
        function updateClockIcons(profile) {

            // Select the clock elements
            const amClock = document.querySelector("#am_clock svg .icons");
            const pmClock = document.querySelector("#pm_clock svg .icons");

            // Iterate over profile properties
            for (let key in profile) {

                // Process only properties that start with "icon" and is not empty
                if (key.startsWith("icon") && profile[key][0] !== "") {

                    // Iterate over array values in each property
                    profile[key].forEach(num => {
                        let g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                        g.classList.add("icon", `icon-${num}`);

                        let use = document.createElementNS("http://www.w3.org/2000/svg", "use");
                        use.setAttributeNS(null, "width", "2");
                        use.setAttributeNS("http://www.w3.org/1999/xlink", "href", `#${key}`);

                        g.appendChild(use);

                        // Append to corresponding SVG
                        if (num >= 0 && num <= 11) {
                            amClock.appendChild(g);
                        } else if (num >= 12 && num <= 23) {
                            pmClock.appendChild(g);
                        }
                    });
                }
            }
        }
        getProfile();

        // Weather Functions
        const weatherContainer = document.getElementById("weather");
        const getWeather = async () => {
            try {
                const response = await fetch('/.netlify/functions/weather');

                if (!response.ok) {
                    let errorText = await response.text();
                    throw new Error(errorText);
                }

                const data = await response.json();
                const todayForecast = data.todayForecastData;
                const currentWeather = data.currentWeatherData;

                if (currentWeather && todayForecast) {
                    updateWeather(currentWeather, todayForecast);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        const updateWeather = (currentWeather, todayForecast) => {
            let precipitationType = todayForecast.DailyForecasts[0].Day.PrecipitationType;
            let precipitationIconDisplay = (precipitationType === "Rain" || precipitationType === "Snow") ? "inline" : "none";

            const weatherHTML = `
            <div class="weather-text">
                <span class="current-temp">${currentWeather[0].RealFeelTemperature.Metric.Value}°</span> ▸
                <span class="max-temp">${todayForecast.DailyForecasts[0].Temperature.Maximum.Value}°</span>
                <svg viewBox="0 0 960 960" style="display: ${precipitationIconDisplay}">
                    <use href="#${precipitationType}">
                </svg>
            </div>
            <svg viewBox="0 0 300 300"><use xlink:href="#w-${todayForecast.DailyForecasts[0].Day.Icon}" width="250" height="250" x="25" y="25"></use></svg>
            `;
            // Get the container and set its innerHTML
            weatherContainer.innerHTML = weatherHTML;
            weatherContainer.style.display = "block";
        }
        getWeather();

        // Calendar Functions
        const getCalendar = async () => {
            try {
                const response = await fetch(`/.netlify/functions/calendar?id=${userId}`);

                if (!response.ok) {
                    let errorText = await response.text();
                    throw new Error(errorText);
                }

                const calendarData = await response.json();

                if (calendarData) {
                    updateCalendarImages(calendarData);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        const updateCalendarImages = (calendarData) => {
            // Get the list of day elements once
            const dayElements = document.getElementsByClassName("day");

            for (let i = 0; i < calendarData.records.length; i++) {
                // create fragment
                let currentDay = document.createDocumentFragment();

                // update photos
                for (let p = 1; p <= 4; p++) {
                    const photoFieldName = `Attachments (from Photo${p})`;
                    const recordFields = calendarData.records[i].fields;

                    if (recordFields[photoFieldName]) {
                        let eventNode = document.createElement("div");
                        eventNode.className = "event";
                        eventNode.style.backgroundImage = `url(${recordFields[photoFieldName][0].thumbnails.large.url})`;
                        currentDay.appendChild(eventNode);
                    }
                }

                // Remove old "event" elements
                let eventNodes = dayElements[i].getElementsByClassName("event");
                while (eventNodes[0]) {
                    eventNodes[0].parentNode.removeChild(eventNodes[0]);
                }

                // Append new "event" elements
                dayElements[i].appendChild(currentDay);
            }
        };
        getCalendar();

        // Refresh
        const refreshData = async () => {
            const h = new Date().getHours();
            if (h >= 6 && h < 21) {
                getWeather();
                getCalendar();
            }
        };
        setInterval(refreshData, 30 * 60 * 1000);

    </script>

</body>

</html>
