    <meta name="apple-mobile-web-app-status-bar-style" content="white">
    <meta name="viewport"
        content="viewport-fit=cover, width=device-width, user-scalable=no, initial-scale=1, maximum-scale=1, minimal-ui">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#ffffff">

    <style>
        @font-face {
            font-family: 'Sofia Sans Condensed';
            src: url('SofiaSansCondensed-subset.woff2') format('woff2-variations');
            font-weight: 1 1000;
        }

        @font-face {
            font-family: 'Wix Madefor Display';
            src: url('WixMadeforDisplay-subset.woff2') format('woff2-variations');
            font-weight: 1 1000;
        }

        html,
        body,
        .parent {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Sofia Sans Condensed', sans-serif;
            user-select: none;
        }

        .parent {
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            padding: 1vw;
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: hsl(0deg 0% 100% / 70%);
            z-index: 9999;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" fill-rule="evenodd" clip-rule="evenodd" image-rendering="optimizeQuality" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" viewBox="0 0 115.563 115.563"><path d="M24.413 31.538h86.172a4.992 4.992 0 0 1 4.978 4.977v64.069a4.992 4.992 0 0 1-4.978 4.977H24.413a4.991 4.991 0 0 1-4.977-4.977v-64.07a4.991 4.991 0 0 1 4.977-4.976zm.194 34.531a2.605 2.605 0 1 1 0 5.21 2.605 2.605 0 0 1 0-5.21zm4.783-26.754h77.618v58.64H29.39v-58.64z"/><path d="M0 91.15V4.976C0 2.239 2.24 0 4.978 0h64.068c2.738 0 4.978 2.24 4.978 4.977v30.02h-7.606V8.555H7.778v77.618h9.635v9.955H4.978A4.992 4.992 0 0 1 0 91.149z"/><path fill="none" d="M79.793 6.193a13.769 13.769 0 0 1 14.162 14.162"/><path fill-rule="nonzero" d="M79.727 3.806a16.149 16.149 0 0 1 6.428 1.135 16.161 16.161 0 0 1 5.466 3.585 16.155 16.155 0 0 1 3.585 5.467 16.137 16.137 0 0 1 1.136 6.428l-4.776-.13a11.386 11.386 0 0 0-.798-4.538 11.377 11.377 0 0 0-2.535-3.837 11.366 11.366 0 0 0-3.838-2.536 11.39 11.39 0 0 0-4.538-.799l-.13-4.775z"/><path d="m88.164 18.095 11.785.388L93.722 29z"/></svg>');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 50vw 50vw;
        }

        @media screen and (orientation:portrait) {
            #overlay {
                display: block;
            }
        }

        .calendar,
        .widgets {
            display: flex;
            flex-direction: row;
            box-sizing: border-box;
            gap: 1vw;
        }

        .widgets {
            justify-content: center;
            align-items: center;
            flex: 1 1 40%;
        }

        .weather {
            display: none;
        }

        .clock,
        .weather {
            flex-basis: 24vw;
            box-sizing: border-box;
            text-align: center;
            overflow: hidden;
        }

        .calendar__day-name,
        .clock__label,
        .weather__temp {
            font-style: normal;
            font-size: 2.8vh;
            line-height: 1;
            text-transform: uppercase;
            text-align: center;
            white-space: nowrap;
        }

        .clock__label {
            line-height: 2;
        }

        .weather__temp {
            font-size: 3.2vh;
        }

        .weather__current-temp {
            font-size: 1.5em;
        }

        .weather__percipitation-icon {
            max-width: 1em;
            max-height: 1em;
            display: none;
            vertical-align: text-top;
        }

        .clock__face,
        .weather__forecast-icon {
            max-height: 30vh;
            max-width: 100%;
        }

        .calendar {
            flex: 1 1 60%;
        }

        .calendar__day {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.5%;
            gap: 1.5%;
            color: black;
            overflow: hidden;
            box-sizing: border-box;
            background: #DBF6FF66;
            border: 1px solid #D9D9D9;
            border-radius: 5px;
            height: 100%;
            flex: none;
            order: 0;
            align-self: center;
            flex: 1 1 0;
        }

        .calendar__day--past {
            opacity: 0.5;
        }

        .calendar__day--weekend {
            background-color: hsl(0deg 100% 94% / 40%);
        }

        .calendar__day--active {
            color: white;
            font-weight: 700;
            background-image: linear-gradient(0deg, #3df5a7 50%, #096fe0 100%);
        }

        .calendar__event {
            background-size: cover;
            background-position: center center;
            border-radius: 5px;
            border: 1px solid white;
            box-sizing: border-box;
            flex: none;
            align-self: stretch;
            flex-grow: 1;
            max-height: 60%;
        }

        .clock {
            --pi: 3.1415926535897932;
            --viewbox: 22px;
            --center: calc(var(--viewbox)/2);
            --icon-radius: 6px;
            --icon-offset-x: -1px;
            --icon-offset-y: -11px;
            --hour-marks-circumference: calc(2*var(--pi)*var(--hour-marks-radius));
            --hour-marks-offset: calc(var(--hour-marks-width)/2);
            --hour-marks-radius: 9.1px;
            --hour-marks-width: calc(var(--hour-marks-circumference)/12*0.04);
            --hour-marks-gap: calc(var(--hour-marks-circumference)/12*0.96);
            --quarter-marks-radius: 5.5px;
            --quarter-marks-circumference: calc(2*var(--pi)*var(--quarter-marks-radius));
            --quarter-marks-width: calc(var(--quarter-marks-circumference)/4*0.03);
            --quarter-marks-gap: calc(var(--quarter-marks-circumference)/4*0.97);
            --quarter-marks-offset: calc(var(--quarter-marks-width)/2);
            --page-background: white;
            --icon-color: hsl(0deg 0% 60%);
            --clock-hands-color: #096fe0;
            --number-radius: 7.8px;
            --number-offset-x: 0px;
            --number-offset-y: 0.6px;
            --number-color: #096fe0;
            --number-outline: none;
            --minute-number-radius: 10.2px;
            --minute-number-offset-x: 0px;
            --minute-number-offset-y: 0.35px;
            --minute-number-color: white;
            --am-clock-background: linear-gradient(0deg, #3df5a7 40%, #096fe0 60%);
            --pm-clock-background: linear-gradient(0deg, #3df5a7 40%, #096fe0 60%);
            --progress-color: #ebebeb;
            --bezel-color: white;
            --hour-hand-angle: calc(var(--hr-elapsed) * 360 / 12 * 1deg);
            --minute-hand-angle: calc(var(--min-elapsed) * 360 / 60 * 1deg);
            --progress-radius: 5.5;
            --progress-min-elapsed: calc((var(--progress-radius) * 2 * var(--pi) / 60) * var(--min-elapsed));
            --progress-min-remaining: calc((var(--progress-radius) * 2 * var(--pi) / 60) * (60 - var(--min-elapsed)));
            --progress-hr-elapsed: calc((var(--progress-radius) * 2 * var(--pi) / 12) * var(--hr-elapsed));
            --progress-hr-remaining: calc((var(--progress-radius) * 2 * var(--pi) / 12) * (12 - var(--hr-elapsed)));
        }

        .clock__face {
            border-radius: 50%;
            outline: solid 1.5px var(--bezel-color);
            outline-offset: -1px;
        }

        .am-clock .clock__face {
            background: var(--am-clock-background);
        }

        .pm-clock .clock__face {
            background: var(--pm-clock-background);
        }

        :root.clock-quarter-marks .clock__quarter-marks {
            r: var(--quarter-marks-radius);
            fill: none;
            stroke: var(--page-background);
            stroke-width: 11px;
            stroke-dashoffset: var(--quarter-marks-offset);
            stroke-dasharray: var(--quarter-marks-width) var(--quarter-marks-gap);
        }

        .clock__hour-marks {
            stroke-dasharray: var(--hour-marks-width) var(--hour-marks-gap);
            stroke-dashoffset: var(--hour-marks-offset);
            r: var(--hour-marks-radius);
            stroke-width: 1px;
            fill: none;
        }

        .clock__progress-ring {
            r: var(--progress-radius);
            fill: none;
            stroke: var(--progress-color);
            stroke-width: 11;
            stroke-dashoffset: 0;
            transform: rotate(-90deg);
            transform-origin: center;
            stroke-dasharray: 0 0;
        }

        .clock--active .clock__progress-ring {
            stroke-dasharray: 0 var(--progress-min-elapsed) var(--progress-min-remaining);
        }

        .clock__hour-hand {
            transform-origin: center;
            transform: rotate(var(--hour-hand-angle));
        }

        .clock__minute-hand {
            transform-origin: center;
            transform: rotate(var(--minute-hand-angle));
        }

        .clock--active .clock__hour-hand line,
        .clock--active .clock__minute-hand line {
            stroke: var(--clock-hands-color);
        }

        .clock__center-point {
            fill: var(--clock-hands-color);
        }

        .clock__hour-numbers {
            pointer-events: none;
            text-anchor: middle;
            stroke-width: 0.2px;
            fill: var(--number-color);
            stroke: var(--number-outline);
            paint-order: stroke;
            font-family: 'Wix Madefor Display', sans-serif;
            letter-spacing: -0.05em;
            font-size: 1.6px;
            font-weight: 600;
        }

        .clock__minute-numbers {
            display: none;
        }

        :root.clock-minute-numbers .clock__minute-numbers {
            display: inline;
            pointer-events: none;
            text-anchor: middle;
            fill: white;
            font-family: 'Wix Madefor Display', sans-serif;
            letter-spacing: -0.05em;
            font-size: 1px;
            font-weight: 600;
        }

        .clock__inner-ring {
            r: 9.6px;
            fill: var(--page-background);
            stroke-width: 0.1;
        }

        .clock__inner-ring,
        .clock__hour-marks {
            stroke: url('#background-geddy');
        }

        .clock__icon {
            width: 2;
            pointer-events: none;
            fill: var(--icon-color);
        }

        .clock__hour-numbers text:nth-of-type(1),
        .clock__minute-numbers text:nth-of-type(1),
        .clock__icon-12,
        .clock__icon-0 {
            --index: 0;
        }

        .clock__hour-numbers text:nth-of-type(2),
        .clock__minute-numbers text:nth-of-type(2),
        .clock__icon-1,
        .clock__icon-13 {
            --index: 1;
        }

        .clock__hour-numbers text:nth-of-type(3),
        .clock__minute-numbers text:nth-of-type(3),
        .clock__icon-2,
        .clock__icon-14 {
            --index: 2;
        }

        .clock__hour-numbers text:nth-of-type(4),
        .clock__minute-numbers text:nth-of-type(4),
        .clock__icon-3,
        .clock__icon-15 {
            --index: 3;
        }

        .clock__hour-numbers text:nth-of-type(5),
        .clock__minute-numbers text:nth-of-type(5),
        .clock__icon-4,
        .clock__icon-16 {
            --index: 4;
        }

        .clock__hour-numbers text:nth-of-type(6),
        .clock__minute-numbers text:nth-of-type(6),
        .clock__icon-5,
        .clock__icon-17 {
            --index: 5;
        }

        .clock__hour-numbers text:nth-of-type(7),
        .clock__minute-numbers text:nth-of-type(7),
        .clock__icon-6,
        .clock__icon-18 {
            --index: 6;
        }

        .clock__hour-numbers text:nth-of-type(8),
        .clock__minute-numbers text:nth-of-type(8),
        .clock__icon-7,
        .clock__icon-19 {
            --index: 7;
        }

        .clock__hour-numbers text:nth-of-type(9),
        .clock__minute-numbers text:nth-of-type(9),
        .clock__icon-8,
        .clock__icon-20 {
            --index: 8;
        }

        .clock__hour-numbers text:nth-of-type(10),
        .clock__minute-numbers text:nth-of-type(10),
        .clock__icon-9,
        .clock__icon-21 {
            --index: 9;
        }

        .clock__hour-numbers text:nth-of-type(11),
        .clock__minute-numbers text:nth-of-type(11),
        .clock__icon-10,
        .clock__icon-22 {
            --index: 10;
        }

        .clock__hour-numbers text:nth-of-type(12),
        .clock__minute-numbers text:nth-of-type(12),
        .clock__icon-11,
        .clock__icon-23 {
            --index: 11;
        }

        .clock__hour-numbers text {
            --translate-x: calc(var(--center) + var(--number-radius) * cos((var(--index) * (360 / 12) - 90) * var(--pi) / 180) + var(--number-offset-x));
            --translate-y: calc(var(--center) + var(--number-radius) * sin((var(--index) * (360 / 12) - 90) * var(--pi) / 180) + var(--number-offset-y));

            transform: translate(var(--translate-x), var(--translate-y));
        }

        .clock__minute-numbers text {
            --translate-x: calc(var(--center) + var(--minute-number-radius) * cos((var(--index) * (360 / 12) - 90) * var(--pi) / 180) + var(--minute-number-offset-x));
            --translate-y: calc(var(--center) + var(--minute-number-radius) * sin((var(--index) * (360 / 12) - 90) * var(--pi) / 180) + var(--minute-number-offset-y));

            transform: translate(var(--translate-x), var(--translate-y));
        }

        .clock__icon {
            --translate-x: calc(var(--center) + var(--icon-radius) * cos((var(--index) * (360 / 12) - 90) * var(--pi) / 180) + var(--icon-offset-x));
            --translate-y: calc(var(--center) + var(--icon-radius) * sin((var(--index) * (360 / 12) - 90) * var(--pi) / 180) + var(--icon-offset-y));

            transform: translate(var(--translate-x), var(--translate-y));
        }

        .symbols-library {
            position: absolute;
            width: 0;
            height: 0;
        }

        .theme-fruits .calendar__day--active {
            background-image: linear-gradient(0deg, #e62214 0%, #f29e18 100%);
        }

        .theme-fruits .clock {
            --hour-marks-radius: 7.6px;
            --hour-marks-width: calc(var(--hour-marks-circumference)/12*0.005);
            --hour-marks-gap: calc(var(--hour-marks-circumference)/12*0.995);
            --number-radius: 9.4px;
            --number-offset-y: 0.92px;
            --icon-radius: 7px;
            --clock-hands-color: black;
            --number-color: black;
            --number-outline: hsl(0deg 0% 100% / 60%);
            --bezel-color: #29A00C;
            --am-clock-background: url('orange.jpg') no-repeat center/102.5%;
            --pm-clock-background: url('watermelon.jpg') no-repeat center/102.5%;
            --progress-color: white;
        }

        .theme-fruits .clock__hour-marks,
        .theme-fruits .clock__inner-ring {
            display: none;
        }

        .theme-fruits .clock__hour-numbers {
            font-size: 2.6px;
        }

        .theme-fruits .clock__progress-ring {
            stroke-width: 11;
        }

        .sleep {
            background-color: black;
        }

        .sleep .calendar {
            visibility: hidden;
        }

        .sleep .clock {
            --page-background: black;
            --clock-hands-color: hsl(0deg 0% 60%);
            --number-color: hsl(0deg 0% 60%);
            --number-outline: none;
            --progress-color: hsl(0deg 0% 20%);
            --bezel-color: black;
        }

        .sleep .clock:not(.clock--active) {
            --am-clock-background: hsl(0deg 0% 20%);
            --pm-clock-background: hsl(0deg 0% 20%);
        }

        .sleep.theme-fruits .clock {
            --am-clock-background: none;
            --pm-clock-background: none;
            --bezel-color: #29A00C;
            --progress-color: none;
        }
    </style>

</head>

    <script>
        //Get URL query parameters
        const queryParams = new URLSearchParams(window.location.search);
        const userId = queryParams.get("id");
        let currentLanguage = queryParams.get("lang") || "en";
        let profile;
        const root = document.documentElement;
        let currentThemeClass;

        // Register service worker
        // if ('serviceWorker' in navigator) {

        // Clock Functions
        const clocks = {
            am: {
                clock: document.getElementById("am-clock"),
                label: document.querySelector("#am-clock .clock__label"),
                icons: document.querySelector("#am-clock .clock__icons")
            },
            pm: {
                clock: document.getElementById("pm-clock"),
                label: document.querySelector("#pm-clock .clock__label"),
                icons: document.querySelector("#pm-clock .clock__icons")
            }
        };

        const runClock = () => {
            const d = new Date();
            const hr = d.getHours();
            const min = d.getMinutes();
            const sec = d.getSeconds();
            const hrElapsed = hr % 12 + min / 60;
            const minElapsed = min + sec / 60;
            const isAM = hr < 12;
            const activeClock = clocks[isAM ? 'am' : 'pm'];
            const inactiveClock = clocks[isAM ? 'pm' : 'am'];

            if (!activeClock.clock.classList.contains("clock--active")) {
                activeClock.clock.classList.add("clock--active");
                inactiveClock.clock.classList.remove("clock--active");
            }

            activeClock.clock.style.setProperty('--hr-elapsed', hrElapsed);
            activeClock.clock.style.setProperty('--min-elapsed', minElapsed);
        };
        runClock();
        setInterval(runClock, 1000);

        const updateSleepMode = () => {
            const d = new Date();
            const hour = d.getHours();
            if (profile?.sleepTimeSec && profile?.wakeUpTimeSec) {
                const sleepTimeHour = profile.sleepTimeSec / 3600;
                const wakeUpTimeHour = profile.wakeUpTimeSec / 3600;
                const isNight = hour >= sleepTimeHour || hour < wakeUpTimeHour;
                root.classList.toggle("sleep", isNight);
            }
        }

        const calDays = document.querySelectorAll(".calendar__day");
        const updateCalendar = () => {
            const d = new Date();
            const day = (d.getDay() + 6) % 7;
            const activeDay = calDays[day];
            if (!activeDay.classList.contains("calendar__day--active")) {
                [...calDays].forEach((dayElement, index) => {
                    dayElement.classList.remove("calendar__day--active", "calendar__day--past");
                    if (index < day) {
                        dayElement.classList.add("calendar__day--past");
                    }
                });
                activeDay.classList.add("calendar__day--active");
            }
        }
        updateCalendar();
        setInterval(updateCalendar, 60 * 1000);

        // Localization Functions
        let manifestData = {
            "id": "https://kids-planner.netlify.app/",
            "scope": "https://kids-planner.netlify.app/",
            "start_url": `https://kids-planner.netlify.app/?id=${userId}`,
            "name": "Kids Planner",
            "short_name": "Kids Planner",
            "description": "",
            "lang": "en",
            "theme_color": "#ffffff",
            "background_color": "#ffffff",
            "display": "fullscreen",
            "orientation": "landscape",
            "categories": [
                "education",
                "kids",
                "productivity"
            ],
            "screenshots": [
                {
                    "src": "https://kids-planner.netlify.app/screenshot.png",
                    "sizes": "1920x1080",
                    "type": "image/png"
                }
            ],
            "icons": [
                {
                    "src": "https://kids-planner.netlify.app/icon-64x64.png",
                    "sizes": "64x64",
                    "type": "image/png"
                },
                {
                    "src": "https://kids-planner.netlify.app/icon-192x192.png",
                    "sizes": "192x192",
                    "type": "image/png"
                },
                {
                    "src": "https://kids-planner.netlify.app/icon-512x512.png",
                    "sizes": "512x512",
                    "type": "image/png"
                },
                {
                    "src": "https://kids-planner.netlify.app/icon-512x512.png",
                    "sizes": "512x512",
                    "type": "image/png",
                    "purpose": "any"
                },
                {
                    "src": "https://kids-planner.netlify.app/maskable-icon-512x512.png",
                    "sizes": "512x512",
                    "type": "image/png",
                    "purpose": "maskable"
                },
            ]
        };
        const localTimeOfDay = {
            "en": {
                "AM": "AM",
                "PM": "PM"
            },
            "bg": {
                "AM": "Предиобед",
                "PM": "Следобед"
            }
        };
        const localDayNames = {
            "en": {
                "Monday": "Monday",
                "Tuesday": "Tuesday",
                "Wednesday": "Wednesday",
                "Thursday": "Thursday",
                "Friday": "Friday",
                "Saturday": "Saturday",
                "Sunday": "Sunday"
            },
            "bg": {
                "Monday": "Понеделник",
                "Tuesday": "Вторник",
                "Wednesday": "Сряда",
                "Thursday": "Четвъртък",
                "Friday": "Петък",
                "Saturday": "Събота",
                "Sunday": "Неделя"
            }
        };

        const localDescriptions = {
            "en": "A static, non-interactive weekly planner for pre-school children. Features a clock, weather widget and a weekly calendar with activities.",
            "bg": "Статичен, неинтерактивен седмичен планер за деца в предучилищна възраст. Разполага с часовник, прогноза за времето и седмичен календар с активности."
        };

        const getProfile = async () => {
            try {
                const response = await fetch(`/.netlify/functions/profile?id=${userId}`);
                if (!response.ok) {
                    let errorText = await response.text();
                    throw new Error(errorText);
                }

                profile = await response.json();
                currentLanguage = profile?.currentLanguage || currentLanguage;
            } catch (error) {
                console.error('Error:', error);
            } finally {
                if (profile?.sleepTimeSec && profile?.wakeUpTimeSec) {
                    updateSleepMode();
                    setInterval(updateSleepMode, 60 * 1000);
                }
                setTheme(profile?.theme);
                updateManifest(profile?.displayName);
                updateTextContent();
                updateClockIcons(profile?.icons);
                setClockFeatures(profile);
            }
        }
        const setTheme = (theme) => {
            if (theme === undefined) return;

            const newThemeClass = `theme-${theme.toLowerCase()}`;
            if (newThemeClass !== currentThemeClass) {
                if (currentThemeClass) root.classList.remove(currentThemeClass);
                root.classList.add(newThemeClass);
                currentThemeClass = newThemeClass;
            }
        }

        const setClockFeatures = ({ clockFeatures = [], clockProgressMode = "" } = {}) => {
            clockFeatures
                .map(feature => feature.replace(/\s+/g, '-').toLowerCase())
                .forEach(className => root.classList.add(`clock-${className}`));

            if (clockProgressMode.trim()) {
                const progressModeClassName = clockProgressMode.replace(/\s+/g, '-').toLowerCase();
                root.classList.add(`clock-progress-${progressModeClassName}`);
            }
        };

        const getFormattedTitle = (displayName, language) => {
            const titles = {
                "bg": displayName ? `Календар на ${displayName}` : "Детски календар",
                "en": displayName ? `${displayName}’s Planner` : "Kids Planner"
            };

            return titles[language];
        }
        const updateManifest = (name) => {
            document.title = getFormattedTitle(name, currentLanguage);
            manifestData.name = getFormattedTitle(name, currentLanguage);
            manifestData.short_name = getFormattedTitle(name, currentLanguage);
            manifestData.lang = currentLanguage;
            manifestData.description = localDescriptions[currentLanguage];
            const manifestBlob = new Blob([JSON.stringify(manifestData)], { type: 'application/manifest+json' });
            const manifestUrl = URL.createObjectURL(manifestBlob);
            document.getElementById('manifestPlaceholder').href = manifestUrl;
        };
        const updateTextContent = () => {
            clocks['am'].label.textContent = localTimeOfDay[currentLanguage]['AM'];
            clocks['pm'].label.textContent = localTimeOfDay[currentLanguage]['PM'];

            const dayNameElements = document.getElementsByClassName("calendar__day-name");
            [...dayNameElements].forEach(element => {
                const initialDayName = element.textContent;
                const localDayName = localDayNames[currentLanguage][initialDayName];
                element.textContent = localDayName;
            });
        };
        function updateClockIcons(icons = {}) {
            for (let icon in icons) {
                icons[icon].forEach(hour => {
                    const iconNode = document.createElement("use");
                    iconNode.classList.add("clock__icon", `clock__icon-${hour}`);
                    iconNode.setAttribute("href", `#icon-${icon}`);
                    (hour <= 11 ? clocks['am'] : clocks['pm']).icons.appendChild(iconNode);
                });
            }
        }
        getProfile();

        // Weather Functions
        const weatherContainer = document.getElementById("weather");
        const getWeather = async () => {
            try {
                const response = await fetch('/.netlify/functions/weather');

                if (!response.ok) {
                    let errorText = await response.text();
                    throw new Error(errorText);
                }

                const data = await response.json();
                const todayForecast = data.todayForecastData;
                const currentWeather = data.currentWeatherData;

                if (currentWeather && todayForecast) {
                    updateWeather(currentWeather, todayForecast);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        const updateWeather = (currentWeather, todayForecast) => {
            let precipitationType = todayForecast.DailyForecasts[0].Day.PrecipitationType;
            let precipitationIconDisplay = (precipitationType === "Rain" || precipitationType === "Snow") ? "inline" : "none";

            const weatherHTML = `
            <div class="weather__temp">
                <span class="weather__current-temp">${currentWeather[0].RealFeelTemperature.Metric.Value}°</span> ▸ <span class="weather__max-temp">${todayForecast.DailyForecasts[0].Temperature.Maximum.Value}°</span>
                <svg viewBox="0 0 960 960" class="weather__percipitation-icon" style="display: ${precipitationIconDisplay}">
                    <use href="#${precipitationType}">
                </svg>
            </div>
            <svg viewBox="0 0 300 300" class="weather__forecast-icon"><use xlink:href="#w-${todayForecast.DailyForecasts[0].Day.Icon}" width="250" height="250" x="25" y="25"></use></svg>
            `;
            // Get the container and set its innerHTML
            weatherContainer.innerHTML = weatherHTML;
            weatherContainer.style.display = "block";
        }
        getWeather();

        // Calendar Functions
        const getCalendar = async () => {
            try {
                const response = await fetch(`/.netlify/functions/calendar?id=${userId}`);

                if (!response.ok) {
                    let errorText = await response.text();
                    throw new Error(errorText);
                }

                const calendarData = await response.json();

                if (calendarData) {
                    updateCalendarImages(calendarData);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        // const updateCalendarImages = (calendarData) => {
        //     // Get the list of day elements once
        //     const dayElements = document.getElementsByClassName("calendar__day");

        //     for (let i = 0; i < calendarData.records.length; i++) {
        //         // create fragment
        //         let currentDay = document.createDocumentFragment();

        //         // update photos
        //         for (let p = 1; p <= 4; p++) {
        //             const photoFieldName = `Attachments (from Photo${p})`;
        //             const recordFields = calendarData.records[i].fields;

        //             if (recordFields[photoFieldName]) {
        //                 let eventNode = document.createElement("div");
        //                 eventNode.className = "calendar__event";
        //                 eventNode.style.backgroundImage = `url(${recordFields[photoFieldName][0].thumbnails.large.url})`;
        //                 currentDay.appendChild(eventNode);
        //             }
        //         }

        //         // Remove old "event" elements
        //         let eventNodes = dayElements[i].getElementsByClassName("calendar__event");
        //         while (eventNodes[0]) {
        //             eventNodes[0].parentNode.removeChild(eventNodes[0]);
        //         }

        //         // Append new "event" elements
        //         dayElements[i].appendChild(currentDay);
        //     }
        // };

        const updateCalendarImages = (calendarData) => {
            console.log(calendarData);
            // Construct an array of arrays containing URLs for each day
            const urlsPerDay = calendarData.records.map((record) =>
                Object.values(record.fields)
                    .flatMap((field) => field.map((item) => item.thumbnails?.large?.url))
                    .filter(Boolean)
            );

            // Create promises to load images for each day
            const loadPromisesPerDay = urlsPerDay.map((urls) =>
                Promise.all(urls.map((url) => new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        const eventNode = document.createElement('div');
                        eventNode.className = 'calendar__event';
                        eventNode.style.backgroundImage = `url(${url})`;
                        resolve(eventNode);
                    };
                    img.src = url;
                })))
            );

            // Wait for all images to be loaded
            Promise.all(loadPromisesPerDay).then((newEventNodesPerDay) => {
                // Iterate over the day elements and replace the old images with the new ones
                [...calDays].forEach((dayElement, i) => {
                    // Remove old events with the class "calendar__event"
                    const oldEvents = [...dayElement.getElementsByClassName('calendar__event')];
                    oldEvents.forEach((eventNode) => eventNode.remove());

                    // Add the new events for this specific day
                    newEventNodesPerDay[i].forEach((eventNode) => dayElement.appendChild(eventNode));
                });
            });
        };

        getCalendar();

        // Refresh
        const refreshData = async () => {
            const h = new Date().getHours();
            if (h >= 6 && h < 21) {
                getWeather();
                getCalendar();
            }
        };
        setInterval(refreshData, 30 * 60 * 1000);

    </script>
